services:
  - type: web
    name: character-creation-api
    runtime: node
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && node prisma/seed.js
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: character-creation-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: character-creation-db
    databaseName: character_creation
    user: character_creation_user
    plan: free